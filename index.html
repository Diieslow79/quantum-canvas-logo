<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Canvas - Generative Logo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0B1426; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #logo-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        .brand-text { position: relative; z-index: 10; text-align: center; pointer-events: none; }
        .brand-name { font-size: clamp(2rem, 8vw, 4rem); font-weight: 900; color: #FFFFFF; letter-spacing: 0.2em; text-transform: uppercase; text-shadow: 0 0 20px rgba(0, 217, 255, 0.5); margin-bottom: 0.5rem; opacity: 0; animation: fadeInUp 1s ease forwards 0.5s; }
        .brand-tagline { font-size: clamp(0.8rem, 2vw, 1.2rem); color: #00A8E8; letter-spacing: 0.5em; text-transform: uppercase; font-weight: 300; opacity: 0; animation: fadeInUp 1s ease forwards 1s; }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(20px); } }
        .corner { position: absolute; width: 60px; height: 60px; border: 2px solid rgba(0, 217, 255, 0.3); z-index: 5; }
        .corner-tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
        .corner-tr { top: 40px; right: 40px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 40px; left: 40px; border-right: none; border-top: none; }
        .corner-br { bottom: 40px; right: 40px; border-left: none; border-top: none; }
        .instruction { position: absolute; bottom: 120px; color: rgba(255, 255, 255, 0.4); font-size: 0.9rem; letter-spacing: 0.1em; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
    </style>
</head>
<body>
    <div id="logo-container">
        <canvas id="neuralCanvas"></canvas>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="brand-text">
            <h1 class="brand-name">Quantum Canvas</h1>
            <p class="brand-tagline">Generative Commerce</p>
        </div>
        <p class="instruction">MOVE CURSOR TO GENERATE • CLICK TO RESET</p>
    </div>
    <script>
        const canvas = document.getElementById('neuralCanvas'), ctx = canvas.getContext('2d');
        let width, height, nodes = [], connections = [], mouse = { x: 0, y: 0 };
        const config = { nodeCount: 15, connectionDistance: 250, mouseRepelRadius: 150, mouseRepelForce: 0.5, returnSpeed: 0.05, colors: { background: '#0B1426', node: '#00D9FF', nodeGlow: 'rgba(0, 217, 255, 0.3)', connection: 'rgba(0, 168, 232, 0.4)', center: '#FFFFFF' }};
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        class Node { constructor(x, y, isCenter = false) { this.originX = x; this.originY = y; this.x = x; this.y = y; this.isCenter = isCenter; this.vx = 0; this.vy = 0; this.radius = isCenter ? 8 : 5; this.glowRadius = isCenter ? 30 : 20; this.angle = Math.random() * Math.PI * 2; this.orbitSpeed = (Math.random() - 0.5) * 0.002; } update() { if (this.isCenter) { this.glowRadius = 30 + Math.sin(Date.now() * 0.003) * 10; return; } this.angle += this.orbitSpeed; const orbitX = this.originX + Math.cos(this.angle) * 20, orbitY = this.originY + Math.sin(this.angle) * 20; const dx = this.x - mouse.x, dy = this.y - mouse.y, distance = Math.sqrt(dx * dx + dy * dy); if (distance < config.mouseRepelRadius) { const force = (config.mouseRepelRadius - distance) / config.mouseRepelRadius, angle = Math.atan2(dy, dx); this.vx += Math.cos(angle) * force * config.mouseRepelForce; this.vy += Math.sin(angle) * force * config.mouseRepelForce; } this.vx += (orbitX - this.x) * config.returnSpeed; this.vy += (orbitY - this.y) * config.returnSpeed; this.vx *= 0.9; this.vy *= 0.9; this.x += this.vx; this.y += this.vy; } draw() { const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.glowRadius); gradient.addColorStop(0, this.isCenter ? 'rgba(255, 255, 255, 0.4)' : config.colors.nodeGlow); gradient.addColorStop(1, 'transparent'); ctx.fillStyle = gradient; ctx.beginPath(); ctx.arc(this.x, this.y, this.glowRadius, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = this.isCenter ? config.colors.center : config.colors.node; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); }}
        function init() { resize(); nodes = []; connections = []; const centerX = width / 2, centerY = height / 2, radius = Math.min(width, height) * 0.25; nodes.push(new Node(centerX, centerY, true)); for (let i = 0; i < config.nodeCount; i++) { const angle = (i / config.nodeCount) * Math.PI * 2; nodes.push(new Node(centerX + Math.cos(angle) * radius, centerY + Math.sin(angle) * radius)); } for (let i = 1; i < nodes.length; i++) { connections.push({ from: nodes[0], to: nodes[i] }); const randomConnections = Math.floor(Math.random() * 2) + 1; for (let j = 0; j < randomConnections; j++) { const targetIndex = Math.floor(Math.random() * (nodes.length - 1)) + 1; if (targetIndex !== i) connections.push({ from: nodes[i], to: nodes[targetIndex] }); } }}
        function drawConnections() { connections.forEach(conn => { const dx = conn.to.x - conn.from.x, dy = conn.to.y - conn.from.y, distance = Math.sqrt(dx * dx + dy * dy); if (distance < config.connectionDistance) { const opacity = 1 - (distance / config.connectionDistance); const gradient = ctx.createLinearGradient(conn.from.x, conn.from.y, conn.to.x, conn.to.y); gradient.addColorStop(0, `rgba(0, 217, 255, ${opacity * 0.6})`); gradient.addColorStop(0.5, `rgba(0, 168, 232, ${opacity * 0.8})`); gradient.addColorStop(1, `rgba(0, 217, 255, ${opacity * 0.6})`); ctx.strokeStyle = gradient; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(conn.from.x, conn.from.y); ctx.lineTo(conn.to.x, conn.to.y); ctx.stroke(); const time = Date.now() * 0.001, particlePos = (time % 1), px = conn.from.x + dx * particlePos, py = conn.from.y + dy * particlePos; ctx.fillStyle = '#FFFFFF'; ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI * 2); ctx.fill(); } }); }
        function animate() { ctx.fillStyle = config.colors.background; ctx.fillRect(0, 0, width, height); drawConnections(); nodes.forEach(node => { node.update(); node.draw(); }); requestAnimationFrame(animate); }
        window.addEventListener('resize', init);
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('click', () => { init(); });
        window.addEventListener('touchmove', (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; });
        init(); animate();
    </script>
</body>
</html>
